# ===== Production Profile =====

# ===== MySQL Database =====
spring.datasource.url=jdbc:mysql://localhost:3306/quantitymeasurementdb?useSSL=false&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:keshav}

# ===== JPA / Hibernate =====
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ===== Logging =====
logging.level.root=WARN
logging.level.com.apps=INFO

# ===== H2 Console (disabled in prod) =====
spring.h2.console.enabled=false

# ===== Actuator (restrict in prod) =====
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never